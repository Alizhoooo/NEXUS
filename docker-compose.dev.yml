version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexus-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nexus-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nexus?schema=public
      - NEXUS_TOKEN_SECRET=dev-secret-key-change-in-production-min-32-chars
      - CORS_ORIGIN=http://localhost:3000
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_dev_data: