services:
  - type: web
    name: nexus
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEXUS_TOKEN_SECRET
        generateValue: true
      - key: NEXUS_INIT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexus_db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://nexus-git-devin-1778487416-nexus-mod-c5e14c-alizhoooos-projects.vercel.app

databases:
  - name: nexus_db
    plan: free
    postgresMajorVersion: 16