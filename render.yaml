services:
  - type: web
    name: nexus
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEXUS_TOKEN_SECRET
        generateValue: true
      - key: NEXUS_INIT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString

databases:
  - name: nexus-db
    plan: free
    postgresMajorVersion: 16