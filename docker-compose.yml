version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/nexus?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXUS_TOKEN_SECRET=${NEXUS_TOKEN_SECRET:-change-this-secret-in-production}
      - CORS_ORIGIN=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data: